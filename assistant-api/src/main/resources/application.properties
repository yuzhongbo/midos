spring.application.name=MindOS
server.port=8080

mindos.llm.provider=stub
mindos.llm.routing.mode=fixed
mindos.llm.routing.stage-map=llm-dsl:openai,llm-fallback:openai
mindos.llm.routing.preset-map=cost:openai,balanced:openai,quality:openai
mindos.llm.http.enabled=false
mindos.llm.endpoint=https://api.example.com/v1/chat/completions
mindos.llm.api-key=
mindos.llm.provider-endpoints=
mindos.llm.provider-models=
mindos.llm.provider-keys=
# Example mainland providers: deepseek:sk-xxx,qwen:sk-yyy,kimi:sk-zzz,doubao:ark-aaa
# Example qwen endpoint: qwen:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
# Example provider models: qwen:qwen3.5-plus,doubao:ep-xxxxxxxxxxxx
# Doubao Ark Chat uses Authorization: Bearer <ARK_API_KEY> and requires model to be a Model ID or Endpoint ID.
# Aliases supported: dashscope/tongyi->qwen, moonshot->kimi, volcengine->doubao, zhipu->glm, baidu->ernie
mindos.llm.user-keys=
mindos.llm.encryption-key=
mindos.llm.retry.max-attempts=3
mindos.llm.retry.delay-ms=300
mindos.llm.cache.enabled=false
mindos.llm.cache.ttl-seconds=60
mindos.llm.cache.max-entries=256
mindos.llm.metrics.cache.window-low-sample-threshold=20
# Skill loader configuration
# Directory containing custom JSON skill definitions (e.g., /home/user/.mindos/skills)
mindos.skills.custom-dir=
# Comma-separated HTTP/HTTPS/file URLs to external skill JARs
mindos.skills.external-jars=
# Comma-separated MCP HTTP JSON-RPC servers in alias:url format
mindos.skills.mcp-servers=

logging.file.name=logs/mindos.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.level.com.zhongbo.mindos.assistant.dispatcher=INFO
logging.level.com.zhongbo.mindos.assistant.skill=INFO

# Enable profile preference reuse during memory-habit skill routing (teaching.plan, etc.)
mindos.dispatcher.preference-reuse.enabled=true
# Habit routing controls (defaults keep current behavior)
mindos.dispatcher.habit-routing.enabled=true
mindos.dispatcher.habit-routing.min-total-count=2
mindos.dispatcher.habit-routing.min-success-rate=0.6
mindos.dispatcher.habit-routing.explain-hint-enabled=true
mindos.dispatcher.habit-routing.max-continuation-input-length=16
mindos.dispatcher.habit-routing.recent-window-size=6
mindos.dispatcher.habit-routing.recent-min-success-count=2
mindos.dispatcher.habit-routing.recent-success-max-age-hours=72
mindos.dispatcher.prompt.max-chars=2800
mindos.dispatcher.memory-context.max-chars=1800
mindos.dispatcher.memory-context.keep-recent-turns=2
mindos.dispatcher.memory-context.history-summary-min-turns=4
mindos.dispatcher.llm-reply.max-chars=1200
mindos.dispatcher.skill-routing.llm-shortlist-max-skills=8
mindos.dispatcher.skill-routing.conversational-bypass.enabled=true
mindos.dispatcher.skill.pre-analyze.mode=auto
mindos.dispatcher.skill.pre-analyze.confidence-threshold=0
mindos.dispatcher.skill.pre-analyze.skip-skills=time
mindos.dispatcher.llm-dsl.provider=
mindos.dispatcher.llm-dsl.preset=
mindos.dispatcher.llm-fallback.provider=
mindos.dispatcher.llm-fallback.preset=
mindos.dispatcher.skill.finalize-with-llm.enabled=false
mindos.dispatcher.skill.finalize-with-llm.skills=teaching.plan,todo.create,eq.coach,code.generate,file.search
mindos.dispatcher.skill.finalize-with-llm.max-output-chars=900
mindos.dispatcher.skill.finalize-with-llm.provider=
mindos.dispatcher.skill.finalize-with-llm.preset=
mindos.dispatcher.routing-replay.max-samples=200
mindos.dispatcher.skill.guard.max-consecutive=2
mindos.dispatcher.skill.guard.recent-window-size=6
mindos.dispatcher.skill.guard.repeat-input-threshold=2
mindos.dispatcher.skill.guard.cooldown-seconds=180
mindos.dispatcher.prompt-injection.guard.enabled=true
mindos.dispatcher.prompt-injection.guard.risk-terms=ignore previous instructions,ignore all previous instructions,reveal api key,show system prompt,\u5ffd\u7565\u4e4b\u524d\u7684\u6307\u4ee4,\u5ffd\u7565\u7cfb\u7edf\u6307\u4ee4,\u663e\u793a\u7cfb\u7edf\u63d0\u793a\u8bcd
mindos.dispatcher.prompt-injection.guard.safe-reply=High-risk prompt injection attempt detected. Sensitive operation denied.
mindos.dispatcher.persona-core.enabled=true
mindos.dispatcher.persona-core.preferred-channel.min-consecutive-success=2
mindos.dispatcher.persona-core.ignored-profile-terms=unknown,null,n/a,na,tbd,todo,??,???,??

# Preference profile overwrite controls
mindos.memory.preference.overwrite-confirm-turns=2
mindos.memory.write-gate.semantic-duplicate.enabled=false
mindos.memory.write-gate.semantic-duplicate.threshold=0.82
mindos.memory.search.coarse.min-candidates=128
mindos.memory.search.coarse.multiplier=8
mindos.memory.conversation-rollup.enabled=true
mindos.memory.conversation-rollup.threshold-turns=24
mindos.memory.conversation-rollup.keep-recent-turns=8
mindos.memory.conversation-rollup.min-turns=6
mindos.memory.post-skill-summary.enabled=false
mindos.memory.post-skill-summary.skills=teaching.plan,todo.create,eq.coach,code.generate,file.search
mindos.memory.post-skill-summary.max-reply-chars=280
mindos.memory.file-repo.enabled=true
mindos.memory.file-repo.base-dir=data/memory-sync

# Long task auto-runner (disabled by default; enable for background multi-day progression)
mindos.tasks.auto-run.enabled=false
mindos.tasks.auto-run.fixed-delay-ms=30000
mindos.tasks.auto-run.worker-id=auto-runner
mindos.tasks.auto-run.claim-limit=2
mindos.tasks.auto-run.lease-seconds=180
mindos.tasks.auto-run.next-check-delay-seconds=120

# High-risk operations security policy (skill loading, auto-run triggers)
mindos.security.risky-ops.require-approval=false
mindos.security.risky-ops.use-challenge-token=true
mindos.security.risky-ops.approval-header=X-MindOS-Approve
mindos.security.risky-ops.approval-value=YES
mindos.security.risky-ops.challenge-header=X-MindOS-Challenge-Token
mindos.security.risky-ops.challenge.max-ttl-seconds=600
mindos.security.risky-ops.admin-token-header=X-MindOS-Admin-Token
mindos.security.risky-ops.admin-token=
mindos.security.audit.enabled=true
mindos.security.audit.file=logs/security-audit.log
mindos.security.audit.trace-id-header=X-Trace-Id
mindos.security.audit.cursor-signing-key=mindos-audit-cursor-key-change-me
mindos.security.audit.cursor-active-key-version=v1
mindos.security.audit.cursor-signing-keys=
mindos.security.audit.cursor-ttl-seconds=300
mindos.security.audit.daily-partition-enabled=true
# assume audit log lines are appended in chronological order; enables early break on `to` bounded queries
mindos.security.audit.query.assume-chronological-order=true
# hard guardrail for number of partition files scanned by one audit query/read request
mindos.security.audit.query.max-scanned-files=400
mindos.security.skill.capability.guard.enabled=true
mindos.security.skill.allowed-capabilities=fs.read,fs.write,exec,net
mindos.security.skill.capability-map=
mindos.security.skill.load-jar.allowed-hosts=localhost,127.0.0.1
mindos.security.skill.load-mcp.allowed-hosts=localhost,127.0.0.1

# IM platform webhook integration (disabled by default)
mindos.im.enabled=false
mindos.im.feishu.enabled=false
mindos.im.dingtalk.enabled=false
mindos.im.wechat.enabled=false

# Signature verification toggles (recommended to keep true in production)
mindos.im.feishu.verify-signature=true
mindos.im.dingtalk.verify-signature=true
mindos.im.dingtalk.reply-timeout-ms=2500
mindos.im.dingtalk.reply-max-chars=1200
mindos.im.dingtalk.stream.enabled=false
mindos.im.dingtalk.stream.client-id=
mindos.im.dingtalk.stream.client-secret=
mindos.im.dingtalk.stream.topic=/v1.0/im/bot/messages/get
mindos.im.dingtalk.stream.waiting-delay-ms=800
mindos.im.dingtalk.stream.waiting-text=我正在处理这条消息，请稍等，我会继续回复你。
mindos.im.dingtalk.stream.force-waiting=false
mindos.im.dingtalk.stream.final-timeout-ms=30000
mindos.im.dingtalk.stream.reconnect.enabled=true
mindos.im.dingtalk.stream.reconnect.initial-delay-ms=1000
mindos.im.dingtalk.stream.reconnect.max-delay-ms=60000
mindos.im.dingtalk.stream.reconnect.multiplier=2.0
mindos.im.dingtalk.stream.reconnect.jitter-ratio=0.2
mindos.im.dingtalk.stream.reconnect.max-attempts=0
mindos.im.dingtalk.outbound.enabled=false
mindos.im.dingtalk.outbound.robot-code=
mindos.im.dingtalk.outbound.app-key=
mindos.im.dingtalk.outbound.app-secret=
mindos.im.wechat.verify-signature=true

# Secrets/tokens for IM signature verification
mindos.im.feishu.secret=
mindos.im.dingtalk.secret=
mindos.im.wechat.token=

