# Solo profile: optimized defaults for single-user daily usage.
# Activate with: --spring.profiles.active=solo

# Faster repeated replies for one user's iterative prompts.
mindos.llm.cache.enabled=${MINDOS_LLM_CACHE_ENABLED:true}
mindos.llm.cache.ttl-seconds=${MINDOS_LLM_CACHE_TTL_SECONDS:120}
mindos.llm.cache.max-entries=${MINDOS_LLM_CACHE_MAX_ENTRIES:512}

# Mixed provider mode: overseas models through proxy, deepseek direct.
mindos.llm.http.enabled=${MINDOS_LLM_HTTP_ENABLED:true}
mindos.llm.provider=${MINDOS_LLM_PROVIDER:gemini}
mindos.llm.routing.mode=${MINDOS_LLM_ROUTING_MODE:fixed}
mindos.llm.routing.stage-map=${MINDOS_LLM_ROUTING_STAGE_MAP:llm-dsl:deepseek,llm-fallback:openai}
mindos.llm.routing.preset-map=${MINDOS_LLM_ROUTING_PRESET_MAP:cost:deepseek,balanced:openai,quality:grok}
# Keep deepseek out of endpoint map so it uses built-in direct endpoint.
mindos.llm.provider-endpoints=${MINDOS_LLM_PROVIDER_ENDPOINTS:openai:https://ai.2756online.com/openai/v1/chat/completions,gemini:https://ai.2756online.com/gemini/v1/chat/completions,grok:https://ai.2756online.com/grok/v1/chat/completions}
# Provide keys via env, e.g. deepseek/openai/gemini/grok in one map string.
mindos.llm.provider-keys=${MINDOS_LLM_PROVIDER_KEYS:}

# Keep context richer for one active user session.
mindos.dispatcher.prompt.max-chars=3200
mindos.dispatcher.memory-context.max-chars=2200
mindos.dispatcher.memory-context.keep-recent-turns=3
mindos.dispatcher.memory-context.history-summary-min-turns=6
mindos.dispatcher.llm-reply.max-chars=1600
mindos.dispatcher.skill-routing.llm-shortlist-max-skills=10

# Keep more hot conversation before rolling into semantic summary.
mindos.memory.conversation-rollup.threshold-turns=40
mindos.memory.conversation-rollup.keep-recent-turns=12
mindos.memory.conversation-rollup.min-turns=8

# Local single-user convenience for observability endpoints.
mindos.security.metrics.require-admin-token=${MINDOS_SECURITY_METRICS_REQUIRE_ADMIN_TOKEN:false}

# IM integration for self-hosted bot domain (e.g. bot.2756online.com).
mindos.im.enabled=${MINDOS_IM_ENABLED:true}

# DingTalk webhook: https://bot.2756online.com/api/im/dingtalk/events
mindos.im.dingtalk.enabled=${MINDOS_IM_DINGTALK_ENABLED:true}
# Set true after first connectivity check succeeds.
mindos.im.dingtalk.verify-signature=${MINDOS_IM_DINGTALK_VERIFY_SIGNATURE:false}
mindos.im.dingtalk.secret=${MINDOS_IM_DINGTALK_SECRET:}

# WeChat webhook: https://bot.2756online.com/api/im/wechat/events
# Keep disabled until official account callback is configured.
mindos.im.wechat.enabled=${MINDOS_IM_WECHAT_ENABLED:false}
mindos.im.wechat.verify-signature=${MINDOS_IM_WECHAT_VERIFY_SIGNATURE:true}
mindos.im.wechat.token=${MINDOS_IM_WECHAT_TOKEN:}

