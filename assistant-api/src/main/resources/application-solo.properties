mindos.memory.preference.default.language=${MINDOS_MEMORY_PREFERENCE_DEFAULT_LANGUAGE:zh-CN}
mindos.memory.preference.default.timezone=${MINDOS_MEMORY_PREFERENCE_DEFAULT_TIMEZONE:Asia/Shanghai}
mindos.memory.preference.default.preferred-channel=${MINDOS_MEMORY_PREFERENCE_DEFAULT_PREFERRED_CHANNEL:}
mindos.memory.post-skill-summary.enabled=${MINDOS_MEMORY_POST_SKILL_SUMMARY_ENABLED:false}
mindos.memory.post-skill-summary.skills=${MINDOS_MEMORY_POST_SKILL_SUMMARY_SKILLS:teaching.plan,todo.create,eq.coach,code.generate,file.search}
mindos.memory.post-skill-summary.max-reply-chars=${MINDOS_MEMORY_POST_SKILL_SUMMARY_MAX_REPLY_CHARS:280}
mindos.memory.file-repo.enabled=${MINDOS_MEMORY_FILE_REPO_ENABLED:true}
mindos.memory.file-repo.base-dir=${MINDOS_MEMORY_FILE_REPO_BASE_DIR:data/memory-sync}

# Example: enable embedded H2 for local JDBC-backed central memory.
# To enable DB-backed central memory, provide a DataSource. When a DataSource is present,
# the application will prefer JDBC central repository over the file-backed one.
# Enable embedded H2 for local JDBC-backed central memory in solo profile.
# This will make a file-based H2 database under ./data/mindos-db and will cause
# CentralMemoryRepositoryConfig to select the JDBC-backed repository.
# Use H2 file mode with options compatible with H2 2.x
spring.datasource.url=jdbc:h2:file:./data/mindos-db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Initialize schema on startup (solo profile) using schema-h2.sql bundled in classpath.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

# Prefer DB-backed central memory in solo profile by disabling file repo.
# Enable H2 console for local inspection (solo profile)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Local single-user convenience for observability endpoints.
mindos.security.metrics.require-admin-token=${MINDOS_SECURITY_METRICS_REQUIRE_ADMIN_TOKEN:false}

# IM integration for self-hosted bot domain (e.g. bot.2756online.com).
mindos.im.enabled=${MINDOS_IM_ENABLED:true}

