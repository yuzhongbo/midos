# Solo profile: optimized defaults for single-user daily usage.
# Activate with: --spring.profiles.active=solo

# Faster repeated replies for one user's iterative prompts.
mindos.llm.cache.enabled=true
mindos.llm.cache.ttl-seconds=120
mindos.llm.cache.max-entries=512

# Keep context richer for one active user session.
mindos.dispatcher.prompt.max-chars=3200
mindos.dispatcher.memory-context.max-chars=2200
mindos.dispatcher.memory-context.keep-recent-turns=3
mindos.dispatcher.memory-context.history-summary-min-turns=6
mindos.dispatcher.llm-reply.max-chars=1600
mindos.dispatcher.skill-routing.llm-shortlist-max-skills=10

# Keep more hot conversation before rolling into semantic summary.
mindos.memory.conversation-rollup.threshold-turns=40
mindos.memory.conversation-rollup.keep-recent-turns=12
mindos.memory.conversation-rollup.min-turns=8

# Local single-user convenience for observability endpoints.
mindos.security.metrics.require-admin-token=false

