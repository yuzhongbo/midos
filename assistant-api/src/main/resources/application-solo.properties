# Solo profile: optimized defaults for single-user daily usage.
# Activate with: --spring.profiles.active=solo

# Faster repeated replies for one user's iterative prompts.
mindos.llm.cache.enabled=${MINDOS_LLM_CACHE_ENABLED:true}
mindos.llm.cache.ttl-seconds=${MINDOS_LLM_CACHE_TTL_SECONDS:120}
mindos.llm.cache.max-entries=${MINDOS_LLM_CACHE_MAX_ENTRIES:512}

# Mixed provider mode: Qwen is the default daily driver; other providers stay available via overrides.
mindos.llm.http.enabled=${MINDOS_LLM_HTTP_ENABLED:true}
mindos.llm.profile=${MINDOS_LLM_PROFILE:QWEN_STABLE}
mindos.llm.provider=${MINDOS_LLM_PROVIDER:qwen}
mindos.llm.routing.mode=${MINDOS_LLM_ROUTING_MODE:fixed}
mindos.llm.routing.stage-map=${MINDOS_LLM_ROUTING_STAGE_MAP:llm-dsl:qwen,llm-fallback:qwen}
mindos.llm.routing.preset-map=${MINDOS_LLM_ROUTING_PRESET_MAP:cost:qwen,balanced:qwen,quality:qwen}
# Keep deepseek out of endpoint map so it uses the built-in direct endpoint.
# Qwen uses DashScope's OpenAI-compatible endpoint; Gemini may use either an
# OpenAI-compatible proxy path or Google's native /v1beta/models/<model>:generateContent endpoint.
mindos.llm.provider-endpoints=${MINDOS_LLM_PROVIDER_ENDPOINTS:openai:https://ai.2756online.com/openai/v1/chat/completions,gemini:https://ai.2756online.com/gemini/v1/chat/completions,qwen:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions,grok:https://ai.2756online.com/grok/v1/chat/completions}
# Provider models are optional for most defaults, but Doubao Ark requires a real Model ID or Endpoint ID.
mindos.llm.provider-models=${MINDOS_LLM_PROVIDER_MODELS:}
# Provide keys via env, e.g. deepseek/openai/gemini/qwen/grok in one map string.
mindos.llm.provider-keys=${MINDOS_LLM_PROVIDER_KEYS:}
mindos.llm.ark.web-search.enabled=${MINDOS_LLM_ARK_WEB_SEARCH_ENABLED:true}
mindos.llm.ark.web-search.stages=${MINDOS_LLM_ARK_WEB_SEARCH_STAGES:}
mindos.llm.ark.web-search.platforms=${MINDOS_LLM_ARK_WEB_SEARCH_PLATFORMS:}

# Keep context richer for one active user session.
mindos.dispatcher.prompt.max-chars=3200
mindos.dispatcher.memory-context.max-chars=2200
mindos.dispatcher.memory-context.keep-recent-turns=3
mindos.dispatcher.memory-context.history-summary-min-turns=6
mindos.dispatcher.llm-reply.max-chars=1600
mindos.dispatcher.skill-routing.llm-shortlist-max-skills=10
mindos.dispatcher.realtime-intent.bypass.enabled=${MINDOS_DISPATCHER_REALTIME_INTENT_BYPASS_ENABLED:true}
mindos.dispatcher.realtime-intent.terms=${MINDOS_DISPATCHER_REALTIME_INTENT_TERMS:天气,气温,下雨,降雨,天气预报,新闻,热点,热搜,头条,汇率,股价,行情,油价,路况,航班,列车,比赛,比分,实时,最新,今日新闻}
mindos.dispatcher.realtime-intent.memory-shrink.enabled=${MINDOS_DISPATCHER_REALTIME_INTENT_MEMORY_SHRINK_ENABLED:true}
mindos.dispatcher.realtime-intent.memory-shrink.max-chars=${MINDOS_DISPATCHER_REALTIME_INTENT_MEMORY_SHRINK_MAX_CHARS:280}
mindos.dispatcher.realtime-intent.memory-shrink.include-persona=${MINDOS_DISPATCHER_REALTIME_INTENT_MEMORY_SHRINK_INCLUDE_PERSONA:true}
mindos.dispatcher.semantic-analysis.llm-enabled=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LLM_ENABLED:true}
mindos.dispatcher.skill.pre-analyze.mode=${MINDOS_DISPATCHER_SKILL_PRE_ANALYZE_MODE:never}
mindos.dispatcher.skill.pre-analyze.confidence-threshold=${MINDOS_DISPATCHER_SKILL_PRE_ANALYZE_CONFIDENCE_THRESHOLD:0}
mindos.dispatcher.skill.pre-analyze.skip-skills=${MINDOS_DISPATCHER_SKILL_PRE_ANALYZE_SKIP_SKILLS:time}
mindos.dispatcher.intent-routing.enabled=${MINDOS_DISPATCHER_INTENT_ROUTING_ENABLED:false}
mindos.dispatcher.intent-routing.default-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_DEFAULT_PROVIDER:gpt}
mindos.dispatcher.intent-routing.code-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_CODE_PROVIDER:gpt}
mindos.dispatcher.intent-routing.realtime-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_REALTIME_PROVIDER:grok}
mindos.dispatcher.intent-routing.emotional-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_EMOTIONAL_PROVIDER:gemini}
mindos.dispatcher.intent-routing.model.general.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_GENERAL_EASY:}
mindos.dispatcher.intent-routing.model.general.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_GENERAL_MEDIUM:}
mindos.dispatcher.intent-routing.model.general.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_GENERAL_HARD:}
mindos.dispatcher.intent-routing.model.code.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_CODE_EASY:}
mindos.dispatcher.intent-routing.model.code.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_CODE_MEDIUM:}
mindos.dispatcher.intent-routing.model.code.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_CODE_HARD:}
mindos.dispatcher.intent-routing.model.realtime.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_REALTIME_EASY:}
mindos.dispatcher.intent-routing.model.realtime.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_REALTIME_MEDIUM:}
mindos.dispatcher.intent-routing.model.realtime.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_REALTIME_HARD:}
mindos.dispatcher.intent-routing.model.emotional.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_EMOTIONAL_EASY:}
mindos.dispatcher.intent-routing.model.emotional.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_EMOTIONAL_MEDIUM:}
mindos.dispatcher.intent-routing.model.emotional.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_EMOTIONAL_HARD:}
mindos.dispatcher.intent-routing.emotional-terms=${MINDOS_DISPATCHER_INTENT_ROUTING_EMOTIONAL_TERMS:情绪,情感,难受,焦虑,压力,内耗,失眠,崩溃,安慰,沟通,关系,吵架,冷战,道歉,挽回}
mindos.dispatcher.intent-routing.hard-input-length-threshold=${MINDOS_DISPATCHER_INTENT_ROUTING_HARD_INPUT_LENGTH_THRESHOLD:180}
mindos.dispatcher.llm-dsl.provider=${MINDOS_DISPATCHER_LLM_DSL_PROVIDER:}
mindos.dispatcher.llm-dsl.preset=${MINDOS_DISPATCHER_LLM_DSL_PRESET:balanced}
mindos.dispatcher.llm-fallback.provider=${MINDOS_DISPATCHER_LLM_FALLBACK_PROVIDER:}
mindos.dispatcher.llm-fallback.preset=${MINDOS_DISPATCHER_LLM_FALLBACK_PRESET:cost}
mindos.dispatcher.skill.finalize-with-llm.enabled=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_ENABLED:true}
mindos.dispatcher.skill.finalize-with-llm.skills=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_SKILLS:teaching.plan,todo.create,eq.coach,code.generate,file.search,mcp.*}
mindos.dispatcher.skill.finalize-with-llm.max-output-chars=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_MAX_OUTPUT_CHARS:900}
mindos.dispatcher.skill.finalize-with-llm.provider=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_PROVIDER:}
mindos.dispatcher.skill.finalize-with-llm.preset=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_PRESET:cost}
mindos.dispatcher.routing-replay.max-samples=${MINDOS_DISPATCHER_ROUTING_REPLAY_MAX_SAMPLES:200}
mindos.dispatcher.skill.guard.pre-execute-heavy.enabled=${MINDOS_DISPATCHER_SKILL_GUARD_PRE_EXECUTE_HEAVY_ENABLED:true}
mindos.dispatcher.skill.guard.pre-execute-heavy.skills=${MINDOS_DISPATCHER_SKILL_GUARD_PRE_EXECUTE_HEAVY_SKILLS:eq.coach,teaching.plan,todo.create,code.generate,file.search,mcp.*}
mindos.dispatcher.skill.timeout.eq-coach-im-ms=${MINDOS_DISPATCHER_SKILL_TIMEOUT_EQ_COACH_IM_MS:12000}
mindos.dispatcher.skill.timeout.eq-coach-im-reply=${MINDOS_DISPATCHER_SKILL_TIMEOUT_EQ_COACH_IM_REPLY:我先给你一个简短结论：当前请求较复杂，我正在整理更完整建议，稍后继续发你。}
mindos.skill.code-generate.llm-provider=${MINDOS_SKILL_CODE_GENERATE_LLM_PROVIDER:gpt}
mindos.skill.code-generate.model.easy=${MINDOS_SKILL_CODE_GENERATE_MODEL_EASY:}
mindos.skill.code-generate.model.medium=${MINDOS_SKILL_CODE_GENERATE_MODEL_MEDIUM:}
mindos.skill.code-generate.model.hard=${MINDOS_SKILL_CODE_GENERATE_MODEL_HARD:}

# Keep more hot conversation before rolling into semantic summary.
mindos.memory.conversation-rollup.threshold-turns=40
mindos.memory.conversation-rollup.keep-recent-turns=12
mindos.memory.conversation-rollup.min-turns=8
mindos.memory.preference.overwrite-confirm-turns=${MINDOS_MEMORY_PREFERENCE_OVERWRITE_CONFIRM_TURNS:2}
mindos.memory.preference.default.assistant-name=${MINDOS_MEMORY_PREFERENCE_DEFAULT_ASSISTANT_NAME:MindOS}
mindos.memory.preference.default.role=${MINDOS_MEMORY_PREFERENCE_DEFAULT_ROLE:personal-assistant}
mindos.memory.preference.default.style=${MINDOS_MEMORY_PREFERENCE_DEFAULT_STYLE:warm}
mindos.memory.preference.default.language=${MINDOS_MEMORY_PREFERENCE_DEFAULT_LANGUAGE:zh-CN}
mindos.memory.preference.default.timezone=${MINDOS_MEMORY_PREFERENCE_DEFAULT_TIMEZONE:Asia/Shanghai}
mindos.memory.preference.default.preferred-channel=${MINDOS_MEMORY_PREFERENCE_DEFAULT_PREFERRED_CHANNEL:}
mindos.memory.post-skill-summary.enabled=${MINDOS_MEMORY_POST_SKILL_SUMMARY_ENABLED:false}
mindos.memory.post-skill-summary.skills=${MINDOS_MEMORY_POST_SKILL_SUMMARY_SKILLS:teaching.plan,todo.create,eq.coach,code.generate,file.search}
mindos.memory.post-skill-summary.max-reply-chars=${MINDOS_MEMORY_POST_SKILL_SUMMARY_MAX_REPLY_CHARS:280}
mindos.memory.file-repo.enabled=${MINDOS_MEMORY_FILE_REPO_ENABLED:true}
mindos.memory.file-repo.base-dir=${MINDOS_MEMORY_FILE_REPO_BASE_DIR:data/memory-sync}

# Local single-user convenience for observability endpoints.
mindos.security.metrics.require-admin-token=${MINDOS_SECURITY_METRICS_REQUIRE_ADMIN_TOKEN:false}

# IM integration for self-hosted bot domain (e.g. bot.2756online.com).
mindos.im.enabled=${MINDOS_IM_ENABLED:true}

# DingTalk webhook: https://bot.2756online.com/api/im/dingtalk/events
mindos.im.dingtalk.enabled=${MINDOS_IM_DINGTALK_ENABLED:true}
# Set true after first connectivity check succeeds.
mindos.im.dingtalk.verify-signature=${MINDOS_IM_DINGTALK_VERIFY_SIGNATURE:false}
mindos.im.dingtalk.secret=${MINDOS_IM_DINGTALK_SECRET:}
mindos.im.dingtalk.reply-timeout-ms=${MINDOS_IM_DINGTALK_REPLY_TIMEOUT_MS:2500}
mindos.im.dingtalk.reply-max-chars=${MINDOS_IM_DINGTALK_REPLY_MAX_CHARS:1200}
mindos.im.dingtalk.stream.enabled=${MINDOS_IM_DINGTALK_STREAM_ENABLED:false}
mindos.im.dingtalk.stream.client-id=${MINDOS_IM_DINGTALK_STREAM_CLIENT_ID:}
mindos.im.dingtalk.stream.client-secret=${MINDOS_IM_DINGTALK_STREAM_CLIENT_SECRET:}
mindos.im.dingtalk.stream.topic=${MINDOS_IM_DINGTALK_STREAM_TOPIC:/v1.0/im/bot/messages/get}
mindos.im.dingtalk.stream.waiting-delay-ms=${MINDOS_IM_DINGTALK_STREAM_WAITING_DELAY_MS:800}
mindos.im.dingtalk.stream.waiting-text=${MINDOS_IM_DINGTALK_STREAM_WAITING_TEXT:已收到，正在处理，稍后给你完整回复。}
mindos.im.dingtalk.stream.force-waiting=${MINDOS_IM_DINGTALK_STREAM_FORCE_WAITING:true}
mindos.im.dingtalk.stream.final-timeout-ms=${MINDOS_IM_DINGTALK_STREAM_FINAL_TIMEOUT_MS:30000}
mindos.im.dingtalk.stream.reconnect.enabled=${MINDOS_IM_DINGTALK_STREAM_RECONNECT_ENABLED:true}
mindos.im.dingtalk.stream.reconnect.initial-delay-ms=${MINDOS_IM_DINGTALK_STREAM_RECONNECT_INITIAL_DELAY_MS:1000}
mindos.im.dingtalk.stream.reconnect.max-delay-ms=${MINDOS_IM_DINGTALK_STREAM_RECONNECT_MAX_DELAY_MS:60000}
mindos.im.dingtalk.stream.reconnect.multiplier=${MINDOS_IM_DINGTALK_STREAM_RECONNECT_MULTIPLIER:2.0}
mindos.im.dingtalk.stream.reconnect.jitter-ratio=${MINDOS_IM_DINGTALK_STREAM_RECONNECT_JITTER_RATIO:0.2}
mindos.im.dingtalk.stream.reconnect.max-attempts=${MINDOS_IM_DINGTALK_STREAM_RECONNECT_MAX_ATTEMPTS:0}
mindos.im.dingtalk.outbound.enabled=${MINDOS_IM_DINGTALK_OUTBOUND_ENABLED:false}
mindos.im.dingtalk.outbound.robot-code=${MINDOS_IM_DINGTALK_OUTBOUND_ROBOT_CODE:}
mindos.im.dingtalk.outbound.app-key=${MINDOS_IM_DINGTALK_OUTBOUND_APP_KEY:}
mindos.im.dingtalk.outbound.app-secret=${MINDOS_IM_DINGTALK_OUTBOUND_APP_SECRET:}

# WeChat webhook: https://bot.2756online.com/api/im/wechat/events
# Keep disabled until official account callback is configured.
mindos.im.wechat.enabled=${MINDOS_IM_WECHAT_ENABLED:false}
mindos.im.wechat.verify-signature=${MINDOS_IM_WECHAT_VERIFY_SIGNATURE:true}
mindos.im.wechat.token=${MINDOS_IM_WECHAT_TOKEN:}
