# Solo profile: optimized defaults for single-user daily usage.
# Activate with: --spring.profiles.active=solo

# Faster repeated replies for one user's iterative prompts.
mindos.llm.cache.enabled=${MINDOS_LLM_CACHE_ENABLED:true}
mindos.llm.cache.ttl-seconds=${MINDOS_LLM_CACHE_TTL_SECONDS:120}
mindos.llm.cache.max-entries=${MINDOS_LLM_CACHE_MAX_ENTRIES:512}

# Mixed provider mode: local Gemma stays for routing/analysis and memory work, while cloud models handle user-facing finalization.
mindos.llm.http.enabled=${MINDOS_LLM_HTTP_ENABLED:true}
mindos.llm.profile=${MINDOS_LLM_PROFILE:}
mindos.llm.provider=${MINDOS_LLM_PROVIDER:local}
mindos.llm.routing.mode=${MINDOS_LLM_ROUTING_MODE:auto}
mindos.llm.routing.stage-map=${MINDOS_LLM_ROUTING_STAGE_MAP:llm-dsl:local,llm-fallback:qwen}
mindos.llm.routing.preset-map=${MINDOS_LLM_ROUTING_PRESET_MAP:cost:local,balanced:local,quality:qwen}
# Keep deepseek out of endpoint map so it uses the built-in direct endpoint.
# Qwen uses DashScope's OpenAI-compatible endpoint; Gemini may use either an
# OpenAI-compatible proxy path or Google's native /v1beta/models/<model>:generateContent endpoint.
mindos.llm.provider-endpoints=${MINDOS_LLM_PROVIDER_ENDPOINTS:local:http://192.168.2.15:11434/api/generate,qwen:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions,openai:https://ai.2756online.com/openai/v1/chat/completions,gemini:https://ai.2756online.com/gemini/v1/chat/completions,grok:https://ai.2756online.com/grok/v1/chat/completions}
# Provider models are optional for most defaults, but Doubao Ark requires a real Model ID or Endpoint ID.
mindos.llm.provider-models=${MINDOS_LLM_PROVIDER_MODELS:local:gemma3:1b-it-q4_K_M}
# Provide keys via env, e.g. deepseek/openai/gemini/qwen/grok in one map string.
mindos.llm.provider-keys=${MINDOS_LLM_PROVIDER_KEYS:}
mindos.llm.ark.web-search.enabled=${MINDOS_LLM_ARK_WEB_SEARCH_ENABLED:true}
mindos.llm.ark.web-search.stages=${MINDOS_LLM_ARK_WEB_SEARCH_STAGES:}
mindos.llm.ark.web-search.platforms=${MINDOS_LLM_ARK_WEB_SEARCH_PLATFORMS:}

# Keep context richer for one active user session.
mindos.dispatcher.prompt.max-chars=3200
mindos.dispatcher.memory-context.max-chars=2200
mindos.dispatcher.memory-context.keep-recent-turns=3
mindos.dispatcher.memory-context.history-summary-min-turns=6
mindos.dispatcher.llm-reply.max-chars=1600
mindos.dispatcher.skill-routing.llm-shortlist-max-skills=10
mindos.dispatcher.llm-dsl.memory-context.max-chars=${MINDOS_DISPATCHER_LLM_DSL_MEMORY_CONTEXT_MAX_CHARS:360}
mindos.dispatcher.search-routing.brave-first.enabled=${MINDOS_DISPATCHER_SEARCH_ROUTING_BRAVE_FIRST_ENABLED:false}
mindos.dispatcher.realtime-intent.bypass.enabled=${MINDOS_DISPATCHER_REALTIME_INTENT_BYPASS_ENABLED:true}
mindos.dispatcher.realtime-intent.terms=${MINDOS_DISPATCHER_REALTIME_INTENT_TERMS:天气,气温,下雨,降雨,天气预报,新闻,热点,热搜,头条,汇率,股价,行情,油价,路况,航班,列车,比赛,比分,实时,最新,今日新闻}
mindos.dispatcher.realtime-intent.memory-shrink.enabled=${MINDOS_DISPATCHER_REALTIME_INTENT_MEMORY_SHRINK_ENABLED:true}
mindos.dispatcher.realtime-intent.memory-shrink.max-chars=${MINDOS_DISPATCHER_REALTIME_INTENT_MEMORY_SHRINK_MAX_CHARS:280}
mindos.dispatcher.realtime-intent.memory-shrink.include-persona=${MINDOS_DISPATCHER_REALTIME_INTENT_MEMORY_SHRINK_INCLUDE_PERSONA:true}
mindos.dispatcher.semantic-analysis.llm-enabled=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LLM_ENABLED:true}
mindos.dispatcher.semantic-analysis.force-local=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_FORCE_LOCAL:true}
mindos.dispatcher.semantic-analysis.llm-provider=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LLM_PROVIDER:local}
mindos.dispatcher.semantic-analysis.llm-preset=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LLM_PRESET:cost}
mindos.dispatcher.semantic-analysis.max-tokens=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_MAX_TOKENS:120}
mindos.dispatcher.semantic-analysis.local-escalation.enabled=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LOCAL_ESCALATION_ENABLED:true}
mindos.dispatcher.semantic-analysis.local-escalation.cloud-provider=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LOCAL_ESCALATION_CLOUD_PROVIDER:qwen}
mindos.dispatcher.semantic-analysis.local-escalation.cloud-preset=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LOCAL_ESCALATION_CLOUD_PRESET:quality}
mindos.dispatcher.semantic-analysis.local-escalation.min-confidence=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_LOCAL_ESCALATION_MIN_CONFIDENCE:0.78}
mindos.dispatcher.semantic-analysis.clarify-min-confidence=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_CLARIFY_MIN_CONFIDENCE:0.70}
mindos.dispatcher.semantic-analysis.skip-short-simple.enabled=${MINDOS_DISPATCHER_SEMANTIC_ANALYSIS_SKIP_SHORT_SIMPLE_ENABLED:true}
mindos.dispatcher.behavior-learning.enabled=${MINDOS_DISPATCHER_BEHAVIOR_LEARNING_ENABLED:true}
mindos.dispatcher.behavior-learning.window-size=${MINDOS_DISPATCHER_BEHAVIOR_LEARNING_WINDOW_SIZE:50}
mindos.dispatcher.behavior-learning.default-param-threshold=${MINDOS_DISPATCHER_BEHAVIOR_LEARNING_DEFAULT_PARAM_THRESHOLD:0.6}
mindos.skill.news-search.enabled=${MINDOS_SKILL_NEWS_SEARCH_ENABLED:true}
mindos.skill.news-search.kr-feed-url=${MINDOS_SKILL_NEWS_SEARCH_KR_FEED_URL:https://36kr.com/feed}
mindos.skill.news-search.http-timeout-ms=${MINDOS_SKILL_NEWS_SEARCH_HTTP_TIMEOUT_MS:5000}
mindos.skill.news-search.cache-ttl-seconds=${MINDOS_SKILL_NEWS_SEARCH_CACHE_TTL_SECONDS:300}
mindos.skill.news-search.cache-max-entries=${MINDOS_SKILL_NEWS_SEARCH_CACHE_MAX_ENTRIES:128}
mindos.skill.news-search.max-items=${MINDOS_SKILL_NEWS_SEARCH_MAX_ITEMS:8}
mindos.skill.news-search.summary-enabled=${MINDOS_SKILL_NEWS_SEARCH_SUMMARY_ENABLED:true}
mindos.skill.news-search.summary-provider=${MINDOS_SKILL_NEWS_SEARCH_SUMMARY_PROVIDER:qwen}
mindos.skill.news-search.summary-preset=${MINDOS_SKILL_NEWS_SEARCH_SUMMARY_PRESET:quality}
mindos.skill.news-search.summary-model=${MINDOS_SKILL_NEWS_SEARCH_SUMMARY_MODEL:qwen3.6-plus}
mindos.skill.news-search.summary-max-tokens=${MINDOS_SKILL_NEWS_SEARCH_SUMMARY_MAX_TOKENS:220}
# Unified query source config (alias:url;api-key=...;news-url=...;search-url=...)
mindos.skills.search-sources=${MINDOS_SKILLS_SEARCH_SOURCES:${MINDOS_SKILL_NEWS_SEARCH_SEARCH_SOURCES:}}
# Serper (google.serper.dev) optional fallback configuration; SerpApi is the precision-search alternative and is supported via search-sources alias `serpapi`.
mindos.skill.news-search.serper.enabled=${MINDOS_SKILL_NEWS_SEARCH_SERPER_ENABLED:false}
mindos.skill.news-search.serper.news-url=${MINDOS_SKILL_NEWS_SEARCH_SERPER_NEWS_URL:https://google.serper.dev/news}
mindos.skill.news-search.serper.search-url=${MINDOS_SKILL_NEWS_SEARCH_SERPER_SEARCH_URL:https://google.serper.dev/search}
mindos.skill.news-search.serper.api-key=${MINDOS_SKILL_NEWS_SEARCH_SERPER_API_KEY:}
mindos.dispatcher.skill.pre-analyze.mode=${MINDOS_DISPATCHER_SKILL_PRE_ANALYZE_MODE:auto}
mindos.dispatcher.skill.pre-analyze.confidence-threshold=${MINDOS_DISPATCHER_SKILL_PRE_ANALYZE_CONFIDENCE_THRESHOLD:120}
mindos.dispatcher.skill.pre-analyze.skip-skills=${MINDOS_DISPATCHER_SKILL_PRE_ANALYZE_SKIP_SKILLS:time}
mindos.dispatcher.intent-routing.enabled=${MINDOS_DISPATCHER_INTENT_ROUTING_ENABLED:true}
mindos.dispatcher.intent-routing.default-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_DEFAULT_PROVIDER:local}
mindos.dispatcher.intent-routing.code-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_CODE_PROVIDER:local}
mindos.dispatcher.intent-routing.realtime-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_REALTIME_PROVIDER:qwen}
mindos.dispatcher.intent-routing.emotional-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_EMOTIONAL_PROVIDER:qwen}
mindos.dispatcher.intent-routing.hard-provider=${MINDOS_DISPATCHER_INTENT_ROUTING_HARD_PROVIDER:qwen}
mindos.dispatcher.intent-routing.model.general.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_GENERAL_EASY:}
mindos.dispatcher.intent-routing.model.general.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_GENERAL_MEDIUM:}
mindos.dispatcher.intent-routing.model.general.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_GENERAL_HARD:}
mindos.dispatcher.intent-routing.model.code.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_CODE_EASY:}
mindos.dispatcher.intent-routing.model.code.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_CODE_MEDIUM:}
mindos.dispatcher.intent-routing.model.code.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_CODE_HARD:}
mindos.dispatcher.intent-routing.model.realtime.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_REALTIME_EASY:}
mindos.dispatcher.intent-routing.model.realtime.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_REALTIME_MEDIUM:}
mindos.dispatcher.intent-routing.model.realtime.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_REALTIME_HARD:}
mindos.dispatcher.intent-routing.model.emotional.easy=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_EMOTIONAL_EASY:}
mindos.dispatcher.intent-routing.model.emotional.medium=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_EMOTIONAL_MEDIUM:}
mindos.dispatcher.intent-routing.model.emotional.hard=${MINDOS_DISPATCHER_INTENT_ROUTING_MODEL_EMOTIONAL_HARD:}
mindos.dispatcher.intent-routing.emotional-terms=${MINDOS_DISPATCHER_INTENT_ROUTING_EMOTIONAL_TERMS:情绪,情感,难受,焦虑,压力,内耗,失眠,崩溃,安慰,沟通,关系,吵架,冷战,道歉,挽回}
mindos.dispatcher.intent-routing.hard-input-length-threshold=${MINDOS_DISPATCHER_INTENT_ROUTING_HARD_INPUT_LENGTH_THRESHOLD:180}
mindos.dispatcher.llm-dsl.provider=${MINDOS_DISPATCHER_LLM_DSL_PROVIDER:local}
mindos.dispatcher.llm-dsl.preset=${MINDOS_DISPATCHER_LLM_DSL_PRESET:cost}
mindos.dispatcher.llm-fallback.provider=${MINDOS_DISPATCHER_LLM_FALLBACK_PROVIDER:}
mindos.dispatcher.llm-fallback.preset=${MINDOS_DISPATCHER_LLM_FALLBACK_PRESET:quality}
mindos.dispatcher.local-escalation.enabled=${MINDOS_DISPATCHER_LOCAL_ESCALATION_ENABLED:true}
mindos.dispatcher.local-escalation.cloud-provider=${MINDOS_DISPATCHER_LOCAL_ESCALATION_CLOUD_PROVIDER:qwen}
mindos.dispatcher.local-escalation.cloud-preset=${MINDOS_DISPATCHER_LOCAL_ESCALATION_CLOUD_PRESET:quality}
mindos.dispatcher.local-escalation.quality.enabled=${MINDOS_DISPATCHER_LOCAL_ESCALATION_QUALITY_ENABLED:true}
mindos.dispatcher.local-escalation.quality.max-reply-chars=${MINDOS_DISPATCHER_LOCAL_ESCALATION_QUALITY_MAX_REPLY_CHARS:32}
mindos.dispatcher.local-escalation.quality.input-terms=${MINDOS_DISPATCHER_LOCAL_ESCALATION_QUALITY_INPUT_TERMS:分析,方案,架构,tradeoff,trade-off,对比,设计,复杂,深度,沟通,情绪,关系,计划,why,explain}
mindos.dispatcher.local-escalation.quality.reply-terms=${MINDOS_DISPATCHER_LOCAL_ESCALATION_QUALITY_REPLY_TERMS:好的,收到,已收到,ok,okay,明白,可以,稍后,后面再说}
mindos.dispatcher.llm-dsl.max-tokens=${MINDOS_DISPATCHER_LLM_DSL_MAX_TOKENS:160}
mindos.dispatcher.llm-fallback.max-tokens=${MINDOS_DISPATCHER_LLM_FALLBACK_MAX_TOKENS:420}
mindos.dispatcher.skill.finalize-with-llm.max-tokens=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_MAX_TOKENS:220}
mindos.dispatcher.skill.finalize-with-llm.enabled=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_ENABLED:true}
# Parallel detected-skill routing (solo profile defaults)
mindos.dispatcher.parallel-routing.enabled=${MINDOS_DISPATCHER_PARALLEL_ROUTING_ENABLED:false}
mindos.dispatcher.parallel-routing.max-candidates=${MINDOS_DISPATCHER_PARALLEL_ROUTING_MAX_CANDIDATES:2}
mindos.dispatcher.parallel-routing.per-skill-timeout-ms=${MINDOS_DISPATCHER_PARALLEL_ROUTING_PER_SKILL_TIMEOUT_MS:2500}
mindos.dispatcher.skill.finalize-with-llm.skills=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_SKILLS:teaching.plan,todo.create,eq.coach,code.generate,file.search,news_search,mcp.*}
mindos.dispatcher.skill.finalize-with-llm.max-output-chars=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_MAX_OUTPUT_CHARS:900}
mindos.dispatcher.skill.finalize-with-llm.provider=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_PROVIDER:qwen}
mindos.dispatcher.skill.finalize-with-llm.preset=${MINDOS_DISPATCHER_SKILL_FINALIZE_WITH_LLM_PRESET:quality}
mindos.dispatcher.routing-replay.max-samples=${MINDOS_DISPATCHER_ROUTING_REPLAY_MAX_SAMPLES:200}
mindos.dispatcher.skill.guard.pre-execute-heavy.enabled=${MINDOS_DISPATCHER_SKILL_GUARD_PRE_EXECUTE_HEAVY_ENABLED:true}
mindos.dispatcher.skill.guard.pre-execute-heavy.skills=${MINDOS_DISPATCHER_SKILL_GUARD_PRE_EXECUTE_HEAVY_SKILLS:eq.coach,teaching.plan,todo.create,code.generate,file.search,mcp.*}
mindos.dispatcher.skill.timeout.eq-coach-im-ms=${MINDOS_DISPATCHER_SKILL_TIMEOUT_EQ_COACH_IM_MS:12000}
mindos.dispatcher.skill.timeout.eq-coach-im-reply=${MINDOS_DISPATCHER_SKILL_TIMEOUT_EQ_COACH_IM_REPLY:我先给你一个简短结论：当前请求较复杂，我正在整理更完整建议，稍后继续发你。}
mindos.skill.code-generate.llm-provider=${MINDOS_SKILL_CODE_GENERATE_LLM_PROVIDER:gpt}
mindos.skill.code-generate.model.easy=${MINDOS_SKILL_CODE_GENERATE_MODEL_EASY:}
mindos.skill.code-generate.model.medium=${MINDOS_SKILL_CODE_GENERATE_MODEL_MEDIUM:}
mindos.skill.code-generate.model.hard=${MINDOS_SKILL_CODE_GENERATE_MODEL_HARD:}

# Keep more hot conversation before rolling into semantic summary.
mindos.memory.conversation-rollup.threshold-turns=40
mindos.memory.conversation-rollup.keep-recent-turns=12
mindos.memory.conversation-rollup.min-turns=8
mindos.memory.preference.overwrite-confirm-turns=${MINDOS_MEMORY_PREFERENCE_OVERWRITE_CONFIRM_TURNS:2}
